<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>강남구 출산 혜택 안내</title>
  <meta name="google-adsense-account" content="ca-pub-5384580632355206">
  <!-- Google AdSense Verification Script -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5384580632355206"
     crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="theme-toggle" class="theme-toggle">Dark Mode</button>
  <header>
    <h1>강남구 출산 혜택 가이드</h1>
    <p>2026년 기준 강남구의 소중한 아이와 부모님을 위한 지원 정책</p>
  </header>
  
  <div class="ad-container top-ad">
    <!-- 상단 광고 유닛 -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-5384580632355206"
         data-ad-slot="YOUR_AD_SLOT_ID_HERE"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <main>
    <section class="search-section">
      <input type="text" id="benefit-search" placeholder="혜택 이름을 검색해보세요... (예: 출산, 부모)">
    </section>
    <div id="benefit-container" class="benefit-grid">
      <!-- Benefits will be injected here by main.js -->
    </div>
    <section id="contact" class="contact-section">
      <h2>추가 혜택 문의하기</h2>
      <p>궁금한 점이 있으시거나 추가 혜택 정보가 필요하시면 아래 폼을 통해 연락주세요.</p>
      <form action="https://formspree.io/f/meeplwdv" method="POST" class="contact-form">
        <div class="form-group">
          <label for="name">성함</label>
          <input type="text" id="name" name="name" required placeholder="홍길동">
        </div>
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" required placeholder="example@email.com">
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="5" required placeholder="문의하실 내용을 입력해주세요."></textarea>
        </div>
        <button type="submit" class="submit-btn">문의 보내기</button>
      </form>
    </section>
  </main>

  <div class="ad-container bottom-ad">
    <!-- 하단 광고 유닛 -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-5384580632355206"
         data-ad-slot="YOUR_AD_SLOT_ID_HERE"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <footer>
    <p>&copy; 2026 Gangnam-gu Childbirth Benefits Guide. 정보는 변경될 수 있으니 반드시 관할 주민센터에 확인하세요.</p>
  </footer>
  <script src="main.js"></script>
</body>
</html>
